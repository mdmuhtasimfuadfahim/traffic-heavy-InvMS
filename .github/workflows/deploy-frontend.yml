name: Deploy Frontend (Vercel)

# Builds and deploys the React app in client/ to production on Vercel.
#
# Required repo secrets (Settings -> Secrets and variables -> Actions):
#   VERCEL_TOKEN       - Vercel account/team access token
#   VERCEL_ORG_ID      - from `vercel link` -> .vercel/project.json (orgId)
#   VERCEL_PROJECT_ID  - from `vercel link` -> .vercel/project.json (projectId)
#
# Set VITE_API_URL as an Environment Variable on the Vercel project itself
# (Project Settings -> Environment Variables), pointing at your deployed
# backend, e.g. https://invms-server.onrender.com

on:
  push:
    branches: [main]
    paths:
      - 'client/**'
      - '.github/workflows/deploy-frontend.yml'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
    defaults:
      run:
        working-directory: client
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Vercel CLI
        if: ${{ secrets.VERCEL_TOKEN != '' }}
        run: npm install --global vercel@latest

      - name: Pull Vercel project settings
        if: ${{ secrets.VERCEL_TOKEN != '' }}
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}

      - name: Build
        if: ${{ secrets.VERCEL_TOKEN != '' }}
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}

      - name: Deploy
        if: ${{ secrets.VERCEL_TOKEN != '' }}
        run: vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}

      - name: Skipped (no Vercel token configured yet)
        if: ${{ secrets.VERCEL_TOKEN == '' }}
        run: |
          echo "VERCEL_TOKEN secret is not set - skipping deploy."
          echo "See README.md > Deployment > Vercel for how to create and add it."
